name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  smoke:
    name: Install & migrate (SQLite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite, intl, mbstring

      - name: Composer install
        run: composer install --no-interaction --prefer-dist

      - name: Set up the demo (SQLite + migrations)
        run: composer setup

      - name: Smoke test (workflow loads + migrations applied)
        run: |
          bin/cake workflow show release
          bin/cake migrations status
